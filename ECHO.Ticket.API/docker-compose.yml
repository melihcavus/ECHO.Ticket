version: '3.8'

services:
  echo-db:
    image: postgres:15-alpine
    container_name: echo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: EchoTicketDb
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - echo_pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: echo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always

  redis:
    image: redis
    container_name: echo_redis
    ports:
      - "6379:6379"
    restart: always

  # --- YENİ EKLENEN YAPAY ZEKA SERVİSLERİ ---

  echo-ai-sentiment:
    # Docker'a diyoruz ki: "Bir üst klasöre çık, ECHO_AI klasörüne gir ve oradaki Dockerfile'ı çalıştır"
    build:
      context: ../../ECHO_AI
    container_name: echo_ai_sentiment
    ports:
      - "8000:8000"
    command: uvicorn sentiment_api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  echo-ai-recommender:
    # İkisi de aynı klasördeki aynı imajı kullanacak, sadece çalıştırdıkları API dosyaları farklı
    build:
      context: ../../ECHO_AI
    container_name: echo_ai_recommender
    ports:
      - "8001:8001"
    command: uvicorn recommender_api:app --host 0.0.0.0 --port 8001
    restart: unless-stopped

volumes:
  echo_pgdata: